{% extends "base.html" %}

{% block content %}
<div class="container section">
    <h1>All Fleet Warranty Guides</h1>
    <p>Browse our complete library of commercial vehicle warranty resources.</p>
    
    <div class="grid">
        {% for item in articles %}
        <div class="card">
            <h3><a href="{{ item.url }}">{{ item.title }}</a></h3>
            <p>{{ item.description }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
